    <script>
        updateView();
        function updateView()
        {
            //  Initializing the current page
            let page = model.app.page;

            console.log(page);

            //  Ensure that page is not null
            if (page == "signup")
            {
                console.log(page);
                signupView();
            }
            else if(page == 'dashboard'){
                dashboardView();
            }
            else if(page == 'transfer'){
                transferView();
            }
            else if(page == 'profile'){
                profileView();
            }
            else {
                loginView();
            }
        }
    </script>
